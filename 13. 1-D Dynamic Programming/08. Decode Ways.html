<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decode Ways</title>
</head>

<body>
    <script>
        // Solution (O(n) Time, O(1) Space)
        function numDecodings(s) {
            if (!s || s.length === 0) return 0;

            // Leading zero → invalid
            if (s[0] === '0') return 0;

            let prev2 = 1; // dp[i-2]
            let prev1 = 1; // dp[i-1]

            for (let i = 1; i < s.length; i++) {
                let current = 0;

                const oneDigit = s[i];
                const twoDigits = s.substring(i - 1, i + 1);

                // ✅ Case 1: Single digit valid (1–9)
                if (oneDigit >= '1' && oneDigit <= '9') {
                    current += prev1;
                }

                // ✅ Case 2: Two digits valid (10–26)
                if (twoDigits >= "10" && twoDigits <= "26") {
                    current += prev2;
                }

                // 🚨 If no decoding possible
                if (current === 0) return 0;

                prev2 = prev1;
                prev1 = current;
            }

            return prev1;
        }












        // Solution (O(n) Time, O(n) Space)
        function numDecodings(s) {
            const n = s.length;
            if (n === 0) return 0;

            const dp = Array(n + 1).fill(0);

            dp[0] = 1;
            dp[1] = s[0] === '0' ? 0 : 1;

            for (let i = 2; i <= n; i++) {
                const oneDigit = s[i - 1];
                const twoDigit = s.substring(i - 2, i);

                if (oneDigit >= '1' && oneDigit <= '9') {
                    dp[i] += dp[i - 1];
                }

                if (twoDigit >= '10' && twoDigit <= '26') {
                    dp[i] += dp[i - 2];
                }
            }

            return dp[n];
        }

        console.log(numDecodings("12"));
    </script>
</body>

</html>
