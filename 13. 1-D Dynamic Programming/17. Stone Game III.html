<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Game III</title>
</head>

<body>
    <script>
        function stoneGameIII(stoneValue) {
            debugger
            const n = stoneValue.length;
            const dp = new Array(n + 1).fill(0);

            for (let i = n - 1; i >= 0; i--) {
                let take = 0;
                dp[i] = -Infinity;

                for (let k = 0; k < 3; k++) {
                    if (i + k < n) {
                        take += stoneValue[i + k];
                        dp[i] = Math.max(dp[i], take - dp[i + k + 1]);
                    }
                }
            }

            if (dp[0] > 0) return "Alice";
            if (dp[0] < 0) return "Bob";
            return "Tie";
        }

        stoneValue = [2, 4, 3, 1]
        console.log(stoneGameIII(stoneValue));
    </script>
</body>

</html>
