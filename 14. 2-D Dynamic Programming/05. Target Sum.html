<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Sum</title>
</head>

<body>
    <script>
        // 2D
        function findTargetSumWays(nums, target) {
            const totalSum = nums.reduce((a, b) => a + b, 0);

            if ((target + totalSum) % 2 !== 0 || Math.abs(target) > totalSum) {
                return 0;
            }

            const subsetSum = (target + totalSum) / 2;
            const n = nums.length;

            // Create 2D DP array
            const dp = Array.from({ length: n + 1 }, () => new Array(subsetSum + 1).fill(0));

            // Base case: 1 way to make sum 0 (pick nothing)
            for (let i = 0; i <= n; i++) {
                dp[i][0] = 1;
            }

            // Fill DP table
            for (let i = 1; i <= n; i++) {
                for (let j = 0; j <= subsetSum; j++) {
                    if (nums[i - 1] <= j) {
                        dp[i][j] = dp[i - 1][j] + dp[i - 1][j - nums[i - 1]];
                    } else {
                        dp[i][j] = dp[i - 1][j];
                    }
                }
            }

            return dp[n][subsetSum];
        }



        // 1D
        function findTargetSumWays(nums, target) {
            const total = nums.reduce((a, b) => a + b, 0);

            // Edge cases
            if ((target + total) % 2 !== 0 || Math.abs(target) > total) {
                return 0;
            }

            const subsetSum = (target + total) / 2;

            // DP array
            const dp = new Array(subsetSum + 1).fill(0);
            dp[0] = 1;

            for (let num of nums) {
                for (let s = subsetSum; s >= num; s--) {
                    dp[s] += dp[s - num];
                }
            }

            return dp[subsetSum];
        }

        nums = [2, 2, 2], target = 2
        console.log(findTargetSumWays(nums, target));
    </script>
</body>

</html>
