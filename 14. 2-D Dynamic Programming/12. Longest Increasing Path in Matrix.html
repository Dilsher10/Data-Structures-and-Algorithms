<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest Increasing Path in Matrix</title>
</head>

<body>
    <script>
        function longestIncreasingPath(matrix) {
            const ROWS = matrix.length;
            const COLS = matrix[0].length;

            // -1 means "not computed yet"
            let dp = Array.from({ length: ROWS }, () => Array(COLS).fill(-1));

            const dfs = (r, c, prevVal) => {
                if (r < 0 || r >= ROWS || c < 0 || c >= COLS || matrix[r][c] <= prevVal) {
                    return 0;
                }

                // If already computed, return cached result
                if (dp[r][c] !== -1) return dp[r][c];

                let res = 1;
                res = Math.max(res, 1 + dfs(r + 1, c, matrix[r][c]));
                res = Math.max(res, 1 + dfs(r - 1, c, matrix[r][c]));
                res = Math.max(res, 1 + dfs(r, c + 1, matrix[r][c]));
                res = Math.max(res, 1 + dfs(r, c - 1, matrix[r][c]));

                // Cache the result for this cell. Cache the result to avoid recomputation
                dp[r][c] = res;
                return res;
            };

            let LIP = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    LIP = Math.max(LIP, dfs(r, c, -Infinity));
                }
            }

            return LIP;
        }

        const matrix = [
            [5, 5, 3],
            [2, 3, 6],
            [1, 1, 1]
        ];

        console.log(longestIncreasingPath(matrix)); // 4
    </script>
</body>

</html>
