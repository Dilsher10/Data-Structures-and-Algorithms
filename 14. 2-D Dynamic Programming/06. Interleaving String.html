<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interleaving String</title>
</head>

<body>
    <script>
        function isInterleave(s1, s2, s3) {
            const m = s1.length;
            const n = s2.length;

            if (m + n !== s3.length) return false;

            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(false));

            dp[0][0] = true;

            // fill first column (only s1)
             for (let i = 1; i <= m; i++) {
                if (s1[i - 1] === s3[i - 1] && dp[i - 1][0]) {
                    dp[i][0] = true;
                }
            }

            // fill first row (only s2)
            for (let j = 1; j <= n; j++) {
                dp[0][j] = dp[0][j - 1] && s2[j - 1] === s3[j - 1];
            }

            // fill rest of dp table
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (s1[i - 1] === s3[i + j - 1] && dp[i - 1][j]) {
                        dp[i][j] = true;
                    }

                    if (s2[j - 1] === s3[i + j - 1] && dp[i][j - 1]) {
                        dp[i][j] = true;
                    }
                }
            }

            return dp[m][n];
        };

        s1 = "aaaa", s2 = "bbbb", s3 = "aabbbbaa"
        console.log(isInterleave(s1, s2, s3));
    </script>
</body>

</html>
