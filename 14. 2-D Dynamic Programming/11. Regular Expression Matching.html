<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regular Expression Matching</title>
</head>

<body>
    <script>
        function isMatch(s, p) {
            const m = s.length;
            const n = p.length;

            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(false));

            dp[0][0] = true;

            // Handle patterns like a*, a*b*, etc in first row.
            for (let i = 2; i <= n; i++) {
                if (p[i - 1] === '*') {
                    dp[0][i] = dp[0][i - 2];
                }
            }

            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (p[j - 1] === '.' || p[j - 1] === s[i - 1]) {
                        dp[i][j] = dp[i - 1][j - 1];
                    } else if (p[j - 1] === '*') {
                        // zero occurrence
                        dp[i][j] = dp[i][j - 2];

                        // one or more occurrence
                        if (p[j - 2] === '.' || p[j - 2] === s[i - 1]) {
                            dp[i][j] = dp[i][j] || dp[i - 1][j];
                        }
                    }
                }
            }

            return dp[m][n];
        }

        s = "faangm", p = "fa*n.m"
        console.log(isMatch(s, p));
    </script>
</body>

</html>
