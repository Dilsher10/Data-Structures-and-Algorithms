<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distinct Subsequences</title>
</head>

<body>
    <script>
        function numDistinct(s, t) {
            const m = s.length;
            const n = t.length;

            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));

            // Base case: empty t
            for (let i = 0; i <= m; i++) {
                dp[i][0] = 1;
            }

            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (s[i - 1] === t[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1] + dp[i - 1][j];
                    } else {
                        dp[i][j] = dp[i - 1][j];
                    }
                }
            }

            return dp[m][n];
        }

        s = "caaat", t = "cat"
        console.log(numDistinct(s, t));
    </script>
</body>

</html>
